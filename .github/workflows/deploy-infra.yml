# =============================================================================
# Woodgrove Groceries — Infrastructure Deploy
#
# Two-identity deployment for split workforce / Entra External ID tenants:
#   1. ENTRA_* identity logs into the CIAM / External ID tenant and provisions
#      app registrations + service principals through Microsoft Graph.
#   2. AZURE_* identity logs into the workforce tenant subscription and deploys
#      Azure resources with provisionEntraApps=false.
#
# Required GitHub repository variables:
#   AZURE_CLIENT_ID       — Workforce tenant deploy app for ARM resources
#   AZURE_TENANT_ID       — Workforce tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID in the workforce tenant
#   ENTRA_CLIENT_ID       — External ID tenant deploy app for CIAM app registrations
#   ENTRA_TENANT_ID       — External ID / CIAM tenant ID
# =============================================================================

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (matches environmentName Bicep param)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      rotate_web_secret:
        description: 'Force rotation of web-client-secret in Key Vault. Also prunes expired credentials on the CIAM app registration.'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'

permissions:
  id-token: write
  contents: read

jobs:
  entra-provision:
    name: Provision CIAM apps → ExtID (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: azure-infra

    outputs:
      web_client_id: ${{ steps.provision.outputs.web_client_id }}
      api_client_id: ${{ steps.provision.outputs.api_client_id }}
      graph_client_id: ${{ steps.provision.outputs.graph_client_id }}
      auth_client_id: ${{ steps.provision.outputs.auth_client_id }}

    env:
      ENV_NAME: ${{ inputs.environment || 'dev' }}
      WEB_DOMAIN: woodgrovedemo.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login to ExtID tenant (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ENTRA_CLIENT_ID }}
          tenant-id: ${{ vars.ENTRA_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Provision CIAM app registrations and service principals
        id: provision
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $envName = $env:ENV_NAME
          $webDomain = $env:WEB_DOMAIN
          $msGraphAppId = '00000003-0000-0000-c000-000000000000'

          # VERIFY: Permission IDs are stable Microsoft Graph IDs; confirm against
          # https://learn.microsoft.com/en-us/graph/permissions-reference before changing.
          $graphOpenIdScopeId = '37f7f235-527c-4136-accd-4a02d197296e'
          $graphOfflineAccessScopeId = '7427e0e9-2fba-42fe-b0c0-848c9e6a8182'
          $graphProfileScopeId = '14dad69e-099b-42c9-810b-d002981feec1'
          $graphUserReadWriteAllRoleId = '741f803b-c850-494e-b5df-cde7c675a1ca'
          $graphGroupReadWriteAllRoleId = '62a82d76-70ea-41e2-9197-370581804d09'
          $graphDirectoryReadWriteAllRoleId = '19dbc75e-c2e2-444c-a770-ec69d8559fc7'

          function New-StableGuid {
            param([Parameter(Mandatory)][string[]] $Parts)
            $inputText = ($Parts -join '|')
            $md5 = [System.Security.Cryptography.MD5]::Create()
            $hash = $md5.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($inputText))
            $hash[6] = ($hash[6] -band 0x0f) -bor 0x30
            $hash[8] = ($hash[8] -band 0x3f) -bor 0x80
            return ([Guid]::new($hash)).ToString()
          }

          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory)][scriptblock] $Action,
              [int] $MaxAttempts = 10,
              [int] $DelaySeconds = 6,
              [string] $Description = 'operation'
            )

            for ($i = 1; $i -le $MaxAttempts; $i++) {
              $global:LASTEXITCODE = 0
              $result = $null
              try {
                $result = & $Action
              }
              catch {
                $result = $null
              }

              if ($LASTEXITCODE -eq 0 -and $null -ne $result) {
                return $result
              }

              if ($i -lt $MaxAttempts) {
                Write-Host "Attempt $i/$MaxAttempts failed: $Description — retrying in ${DelaySeconds}s"
                Start-Sleep -Seconds $DelaySeconds
              }
            }

            throw "Failed after $MaxAttempts attempts: $Description"
          }

          function Get-AppByDisplayName {
            param([Parameter(Mandatory)][string] $DisplayName)
            $listResult = Invoke-WithRetry -Description "list app registrations named $DisplayName" -Action {
              $apps = az ad app list --display-name $DisplayName --output json | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { return $null }
              return [pscustomobject]@{ Apps = @($apps) }
            }
            return @($listResult.Apps | Where-Object { $_.displayName -eq $DisplayName } | Select-Object -First 1)[0]
          }

          function Get-AppRegistrationByAppId {
            param(
              [Parameter(Mandatory)][string] $AppId,
              [string] $Description = "show app registration $AppId"
            )

            return Invoke-WithRetry -Description $Description -Action {
              $app = az ad app show --id $AppId --output json | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { return $null }
              if ($null -eq $app -or [string]::IsNullOrWhiteSpace($app.id) -or [string]::IsNullOrWhiteSpace($app.appId)) { return $null }
              return $app
            }
          }

          function Ensure-AppRegistration {
            param([Parameter(Mandatory)][string] $DisplayName)
            $app = Get-AppByDisplayName -DisplayName $DisplayName
            if ($null -eq $app) {
              Write-Host "Creating app registration: $DisplayName"
              $app = Invoke-WithRetry -Description "create app registration: $DisplayName" -Action {
                $createdApp = az ad app create `
                  --display-name $DisplayName `
                  --sign-in-audience AzureADMyOrg `
                  --output json | ConvertFrom-Json
                if ($LASTEXITCODE -ne 0) { return $null }
                if ($null -eq $createdApp -or [string]::IsNullOrWhiteSpace($createdApp.appId)) { return $null }
                return $createdApp
              }
            }
            else {
              Write-Host "Reusing app registration: $DisplayName ($($app.appId))"
            }

            return Get-AppRegistrationByAppId -AppId $app.appId -Description "show app registration: $DisplayName ($($app.appId))"
          }

          function Invoke-GraphPatch {
            param(
              [Parameter(Mandatory)][string] $Uri,
              [Parameter(Mandatory)] $Body
            )
            $bodyPath = Join-Path $PWD '.gha-graph-body.json'
            $Body | ConvertTo-Json -Depth 30 | Out-File -FilePath $bodyPath -Encoding utf8
            try {
              $null = Invoke-WithRetry -Description "PATCH $Uri" -Action {
                az rest `
                  --method PATCH `
                  --uri $Uri `
                  --headers 'Content-Type=application/json' `
                  --body "@$bodyPath" `
                  --output none
                if ($LASTEXITCODE -ne 0) { return $null }
                return $true
              }
            }
            finally {
              Remove-Item $bodyPath -Force -ErrorAction SilentlyContinue
            }
          }

          function Get-ServicePrincipalByAppId {
            param(
              [Parameter(Mandatory)][string] $AppId,
              [string] $Description = "show service principal $AppId"
            )

            return Invoke-WithRetry -Description $Description -Action {
              $sp = az ad sp show --id $AppId --output json | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { return $null }
              if ($null -eq $sp -or [string]::IsNullOrWhiteSpace($sp.id)) { return $null }
              return $sp
            }
          }

          function Ensure-ServicePrincipal {
            param([Parameter(Mandatory)][string] $AppId)
            if ([string]::IsNullOrWhiteSpace($AppId)) {
              throw 'Ensure-ServicePrincipal: AppId is empty'
            }

            $sp = $null
            $global:LASTEXITCODE = 0
            try {
              $sp = az ad sp show --id $AppId --output json 2>$null | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0 -or $null -eq $sp -or [string]::IsNullOrWhiteSpace($sp.id)) {
                $sp = $null
              }
            }
            catch {
              $sp = $null
            }

            if ($null -eq $sp) {
              Write-Host "Creating service principal for appId $AppId"
              $null = Invoke-WithRetry -Description "create service principal for appId $AppId" -Action {
                $createdSp = az ad sp create --id $AppId --output json | ConvertFrom-Json
                if ($LASTEXITCODE -ne 0) { return $null }
                if ($null -eq $createdSp -or [string]::IsNullOrWhiteSpace($createdSp.id)) { return $null }
                return $createdSp
              }
            }
            else {
              Write-Host "Reusing service principal for appId $AppId"
            }

            return Get-ServicePrincipalByAppId -AppId $AppId -Description "show service principal for appId $AppId"
          }

          function Ensure-AppRoleAssignment {
            param(
              [Parameter(Mandatory)][string] $PrincipalServicePrincipalId,
              [Parameter(Mandatory)][string] $ResourceServicePrincipalId,
              [Parameter(Mandatory)][string] $AppRoleId
            )

            $assignments = Invoke-WithRetry -Description "list app role assignments for $PrincipalServicePrincipalId" -Action {
              $response = az rest `
                --method GET `
                --uri "https://graph.microsoft.com/v1.0/servicePrincipals/$PrincipalServicePrincipalId/appRoleAssignments" `
                --output json | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { return $null }
              if ($null -eq $response) { return $null }
              return $response
            }
            $existing = @($assignments.value | Where-Object {
              $_.resourceId -eq $ResourceServicePrincipalId -and $_.appRoleId -eq $AppRoleId
            })

            if ($existing.Count -eq 0) {
              $body = [ordered]@{
                principalId = $PrincipalServicePrincipalId
                resourceId = $ResourceServicePrincipalId
                appRoleId = $AppRoleId
              }
              $bodyPath = Join-Path $PWD '.gha-app-role-assignment.json'
              $body | ConvertTo-Json -Depth 5 | Out-File -FilePath $bodyPath -Encoding utf8
              try {
                $null = Invoke-WithRetry -Description "create app role assignment $AppRoleId" -Action {
                  az rest `
                    --method POST `
                    --uri "https://graph.microsoft.com/v1.0/servicePrincipals/$PrincipalServicePrincipalId/appRoleAssignments" `
                    --headers 'Content-Type=application/json' `
                    --body "@$bodyPath" `
                    --output none
                  if ($LASTEXITCODE -ne 0) { return $null }
                  return $true
                }
              }
              finally {
                Remove-Item $bodyPath -Force -ErrorAction SilentlyContinue
              }
            }
          }

          function Ensure-OAuth2PermissionGrant {
            param(
              [Parameter(Mandatory)][string] $ClientServicePrincipalId,
              [Parameter(Mandatory)][string] $ResourceServicePrincipalId,
              [Parameter(Mandatory)][string] $Scope
            )

            $encodedFilter = [System.Uri]::EscapeDataString("clientId eq '$ClientServicePrincipalId' and resourceId eq '$ResourceServicePrincipalId'")
            $grants = Invoke-WithRetry -Description "list OAuth2 permission grants for $ClientServicePrincipalId" -Action {
              $response = az rest `
                --method GET `
                --uri "https://graph.microsoft.com/v1.0/oauth2PermissionGrants?`$filter=$encodedFilter" `
                --output json | ConvertFrom-Json
              if ($LASTEXITCODE -ne 0) { return $null }
              if ($null -eq $response) { return $null }
              return $response
            }
            $existing = @($grants.value | Select-Object -First 1)[0]
            $requestedScopes = @($Scope -split ' ' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

            if ($null -ne $existing) {
              $currentScopes = @($existing.scope -split ' ' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
              $mergedScopes = @($currentScopes + $requestedScopes | Select-Object -Unique)
              $mergedScope = ($mergedScopes -join ' ')
              if ($mergedScope -ne $existing.scope) {
                $body = [ordered]@{ scope = $mergedScope }
                $bodyPath = Join-Path $PWD '.gha-oauth2-grant.json'
                $body | ConvertTo-Json -Depth 5 | Out-File -FilePath $bodyPath -Encoding utf8
                try {
                  $null = Invoke-WithRetry -Description "update OAuth2 permission grant $($existing.id)" -Action {
                    az rest `
                      --method PATCH `
                      --uri "https://graph.microsoft.com/v1.0/oauth2PermissionGrants/$($existing.id)" `
                      --headers 'Content-Type=application/json' `
                      --body "@$bodyPath" `
                      --output none
                    if ($LASTEXITCODE -ne 0) { return $null }
                    return $true
                  }
                }
                finally {
                  Remove-Item $bodyPath -Force -ErrorAction SilentlyContinue
                }
              }
              return
            }

            $body = [ordered]@{
              clientId = $ClientServicePrincipalId
              consentType = 'AllPrincipals'
              resourceId = $ResourceServicePrincipalId
              scope = $Scope
            }
            $bodyPath = Join-Path $PWD '.gha-oauth2-grant.json'
            $body | ConvertTo-Json -Depth 5 | Out-File -FilePath $bodyPath -Encoding utf8
            try {
              $null = Invoke-WithRetry -Description "create OAuth2 permission grant for $ClientServicePrincipalId" -Action {
                az rest `
                  --method POST `
                  --uri 'https://graph.microsoft.com/v1.0/oauth2PermissionGrants' `
                  --headers 'Content-Type=application/json' `
                  --body "@$bodyPath" `
                  --output none
                if ($LASTEXITCODE -ne 0) { return $null }
                return $true
              }
            }
            finally {
              Remove-Item $bodyPath -Force -ErrorAction SilentlyContinue
            }
          }

          $apiDisplayName = "woodgrove-groceries-api ($envName)"
          $webDisplayName = "woodgrove-groceries ($envName)"
          $graphDisplayName = "woodgrove-graph-middleware ($envName)"
          $authDisplayName = "woodgrove-auth-api ($envName)"

          $apiApp = Ensure-AppRegistration -DisplayName $apiDisplayName
          $apiScope = @($apiApp.api.oauth2PermissionScopes | Where-Object { $_.value -eq 'access_as_user' } | Select-Object -First 1)[0]
          $apiAccessAsUserScopeId = if ($apiScope -and $apiScope.id) { $apiScope.id } else { New-StableGuid -Parts @($envName, 'woodgrove-api', 'access_as_user') }

          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$($apiApp.id)" `
            -Body ([ordered]@{
              signInAudience = 'AzureADMyOrg'
              identifierUris = @("api://woodgrove-groceries-api-$envName")
              api = [ordered]@{
                requestedAccessTokenVersion = 2
                oauth2PermissionScopes = @(
                  [ordered]@{
                    id = $apiAccessAsUserScopeId
                    adminConsentDisplayName = 'Access woodgrove-groceries-api as the signed-in user'
                    adminConsentDescription = 'Allows the app to access woodgrove-groceries-api on behalf of the signed-in user.'
                    userConsentDisplayName = 'Access woodgrove-groceries-api'
                    userConsentDescription = 'Allows this app to access woodgrove-groceries-api on your behalf.'
                    value = 'access_as_user'
                    type = 'User'
                    isEnabled = $true
                  }
                )
              }
            })
          $apiApp = Get-AppRegistrationByAppId -AppId $apiApp.appId -Description "show app registration after API patch: $apiDisplayName"
          $apiSp = Ensure-ServicePrincipal -AppId $apiApp.appId

          $webApp = Ensure-AppRegistration -DisplayName $webDisplayName
          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$($webApp.id)" `
            -Body ([ordered]@{
              signInAudience = 'AzureADMyOrg'
              web = [ordered]@{
                redirectUris = @("https://$webDomain/signin-oidc")
                implicitGrantSettings = [ordered]@{
                  enableIdTokenIssuance = $true
                  enableAccessTokenIssuance = $false
                }
              }
              requiredResourceAccess = @(
                [ordered]@{
                  resourceAppId = $apiApp.appId
                  resourceAccess = @([ordered]@{ id = $apiAccessAsUserScopeId; type = 'Scope' })
                }
                [ordered]@{
                  resourceAppId = $msGraphAppId
                  resourceAccess = @(
                    [ordered]@{ id = $graphOpenIdScopeId; type = 'Scope' }
                    [ordered]@{ id = $graphOfflineAccessScopeId; type = 'Scope' }
                    [ordered]@{ id = $graphProfileScopeId; type = 'Scope' }
                  )
                }
              )
            })
          $webApp = Get-AppRegistrationByAppId -AppId $webApp.appId -Description "show app registration after web patch: $webDisplayName"
          $webSp = Ensure-ServicePrincipal -AppId $webApp.appId

          $graphApp = Ensure-AppRegistration -DisplayName $graphDisplayName
          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$($graphApp.id)" `
            -Body ([ordered]@{
              signInAudience = 'AzureADMyOrg'
              requiredResourceAccess = @(
                [ordered]@{
                  resourceAppId = $msGraphAppId
                  resourceAccess = @(
                    [ordered]@{ id = $graphUserReadWriteAllRoleId; type = 'Role' }
                    [ordered]@{ id = $graphGroupReadWriteAllRoleId; type = 'Role' }
                    [ordered]@{ id = $graphDirectoryReadWriteAllRoleId; type = 'Role' }
                  )
                }
              )
            })
          $graphApp = Get-AppRegistrationByAppId -AppId $graphApp.appId -Description "show app registration after graph patch: $graphDisplayName"
          $graphSp = Ensure-ServicePrincipal -AppId $graphApp.appId

          $authApp = Ensure-AppRegistration -DisplayName $authDisplayName
          $authRole = @($authApp.appRoles | Where-Object { $_.value -eq 'CustomAuthenticationExtension.Receive.Payload' } | Select-Object -First 1)[0]
          $authRoleId = if ($authRole -and $authRole.id) { $authRole.id } else { New-StableGuid -Parts @($envName, 'auth-api', 'CustomAuthenticationExtension.Receive.Payload') }
          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$($authApp.id)" `
            -Body ([ordered]@{
              signInAudience = 'AzureADMyOrg'
              appRoles = @(
                [ordered]@{
                  id = $authRoleId
                  displayName = 'CustomAuthenticationExtension.Receive.Payload'
                  description = 'Allows the custom authentication extension to receive payloads from Entra External ID'
                  value = 'CustomAuthenticationExtension.Receive.Payload'
                  allowedMemberTypes = @('Application')
                  isEnabled = $true
                }
              )
            })
          $authApp = Get-AppRegistrationByAppId -AppId $authApp.appId -Description "show app registration after auth patch: $authDisplayName"
          $authSp = Ensure-ServicePrincipal -AppId $authApp.appId

          $msGraphSp = az ad sp show --id $msGraphAppId --output json | ConvertFrom-Json
          Ensure-AppRoleAssignment -PrincipalServicePrincipalId $graphSp.id -ResourceServicePrincipalId $msGraphSp.id -AppRoleId $graphUserReadWriteAllRoleId
          Ensure-AppRoleAssignment -PrincipalServicePrincipalId $graphSp.id -ResourceServicePrincipalId $msGraphSp.id -AppRoleId $graphGroupReadWriteAllRoleId
          Ensure-AppRoleAssignment -PrincipalServicePrincipalId $graphSp.id -ResourceServicePrincipalId $msGraphSp.id -AppRoleId $graphDirectoryReadWriteAllRoleId
          Ensure-OAuth2PermissionGrant -ClientServicePrincipalId $webSp.id -ResourceServicePrincipalId $apiSp.id -Scope 'access_as_user'
          Ensure-OAuth2PermissionGrant -ClientServicePrincipalId $webSp.id -ResourceServicePrincipalId $msGraphSp.id -Scope 'openid offline_access profile'

          "web_client_id=$($webApp.appId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "api_client_id=$($apiApp.appId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "graph_client_id=$($graphApp.appId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "auth_client_id=$($authApp.appId)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  azure-deploy:
    name: Deploy Azure resources → workforce (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: entra-provision
    environment: azure-infra

    env:
      ENV_NAME: ${{ inputs.environment || 'dev' }}
      LOCATION: westus2
      ROTATE_WEB_SECRET: ${{ inputs.rotate_web_secret || false }}
      WEB_CLIENT_ID: ${{ needs.entra-provision.outputs.web_client_id }}
      API_CLIENT_ID: ${{ needs.entra-provision.outputs.api_client_id }}
      GRAPH_CLIENT_ID: ${{ needs.entra-provision.outputs.graph_client_id }}
      AUTH_CLIENT_ID: ${{ needs.entra-provision.outputs.auth_client_id }}
      ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
      CIAM_SUBDOMAIN: ${{ vars.ENTRA_CIAM_SUBDOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login to workforce tenant (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install / upgrade Bicep CLI
        run: az bicep install

      - name: Validate Bicep template (lint + build)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          az bicep lint --file infra/main.bicep
          az bicep build --file infra/main.bicep --stdout | Out-Null

      - name: What-if (deployment preview)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          az deployment sub what-if `
            --name "woodgrove-whatif-$($env:ENV_NAME)-${{ github.run_number }}" `
            --location $env:LOCATION `
            --template-file infra/main.bicep `
            --parameters infra/main.bicepparam `
                         environmentName=$env:ENV_NAME `
                         provisionEntraApps=false `
                         webClientId=$env:WEB_CLIENT_ID `
                         apiClientId=$env:API_CLIENT_ID `
                         graphClientId=$env:GRAPH_CLIENT_ID `
                         authClientId=$env:AUTH_CLIENT_ID `
                         tenantId=$env:ENTRA_TENANT_ID `
                         entraAuthorityUrl="https://$($env:CIAM_SUBDOMAIN).ciamlogin.com/$($env:ENTRA_TENANT_ID)/v2.0" `
                         webDomain="$($env:CIAM_SUBDOMAIN).onmicrosoft.com"

      - name: Deploy infrastructure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          az deployment sub create `
            --name "woodgrove-deploy-$($env:ENV_NAME)-${{ github.run_number }}" `
            --location $env:LOCATION `
            --template-file infra/main.bicep `
            --parameters infra/main.bicepparam `
                         environmentName=$env:ENV_NAME `
                         provisionEntraApps=false `
                         webClientId=$env:WEB_CLIENT_ID `
                         apiClientId=$env:API_CLIENT_ID `
                         graphClientId=$env:GRAPH_CLIENT_ID `
                         authClientId=$env:AUTH_CLIENT_ID `
                         tenantId=$env:ENTRA_TENANT_ID `
                         entraAuthorityUrl="https://$($env:CIAM_SUBDOMAIN).ciamlogin.com/$($env:ENTRA_TENANT_ID)/v2.0" `
                         webDomain="$($env:CIAM_SUBDOMAIN).onmicrosoft.com" `
            --output json | Tee-Object -FilePath deploy-output.json | Out-Null

      - name: Azure login to ExtID tenant for redirect URI sync
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ENTRA_CLIENT_ID }}
          tenant-id: ${{ vars.ENTRA_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Synchronize app-service redirect URIs in ExtID
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outputs = (Get-Content deploy-output.json -Raw | ConvertFrom-Json).properties.outputs
          $webHost = $outputs.webAppHostName.value
          $authHost = $outputs.authAppHostName.value
          $webObjectId = az ad app show --id $env:WEB_CLIENT_ID --query id -o tsv
          $authObjectId = az ad app show --id $env:AUTH_CLIENT_ID --query id -o tsv

          function Invoke-GraphPatch {
            param(
              [Parameter(Mandatory)][string] $Uri,
              [Parameter(Mandatory)] $Body
            )
            $bodyPath = Join-Path $PWD '.gha-graph-body.json'
            $Body | ConvertTo-Json -Depth 20 | Out-File -FilePath $bodyPath -Encoding utf8
            az rest `
              --method PATCH `
              --uri $Uri `
              --headers 'Content-Type=application/json' `
              --body "@$bodyPath" `
              --output none
            Remove-Item $bodyPath -Force
          }

          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$webObjectId" `
            -Body ([ordered]@{
              web = [ordered]@{
                redirectUris = @(
                  "https://$webHost/signin-oidc"
                  'https://woodgrovedemo.com/signin-oidc'
                )
                logoutUrl = "https://$webHost/signout-oidc"
                implicitGrantSettings = [ordered]@{
                  enableIdTokenIssuance = $true
                  enableAccessTokenIssuance = $false
                }
              }
            })

          Invoke-GraphPatch `
            -Uri "https://graph.microsoft.com/v1.0/applications/$authObjectId" `
            -Body ([ordered]@{
              web = [ordered]@{
                redirectUris = @("https://$authHost/")
              }
            })

      - name: Azure login to workforce tenant for Key Vault check
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check web-client-secret in Key Vault
        id: web_secret_check
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outputs = (Get-Content deploy-output.json -Raw | ConvertFrom-Json).properties.outputs
          $kvName = $outputs.keyVaultName.value
          $rotate = [System.Convert]::ToBoolean($env:ROTATE_WEB_SECRET)

          $prevEap = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          $secretId = az keyvault secret show `
            --vault-name $kvName `
            --name web-client-secret `
            --query id `
            --output tsv 2>$null
          $showExit = $LASTEXITCODE
          $ErrorActionPreference = $prevEap
          if ($showExit -ne 0) {
            $secretId = $null
          }
          # Clear the non-zero exit code from the (expected) 'secret not found' az call so the step doesn't inherit it
          $global:LASTEXITCODE = 0

          $exists = -not [string]::IsNullOrWhiteSpace($secretId)
          $shouldUpdate = $rotate -or -not $exists
          "kv_name=$kvName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "should_update=$($shouldUpdate.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($exists -and -not $rotate) {
            Write-Host 'web-client-secret already present in Key Vault — skipping creation (use rotate_web_secret to force rotation).'
          }

      - name: Azure login to ExtID tenant for web credential
        if: steps.web_secret_check.outputs.should_update == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ENTRA_CLIENT_ID }}
          tenant-id: ${{ vars.ENTRA_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create or rotate web app credential in ExtID
        if: steps.web_secret_check.outputs.should_update == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $secretPath = Join-Path $PWD '.web-client-secret'
          $rotate = [System.Convert]::ToBoolean($env:ROTATE_WEB_SECRET)

          if ($rotate) {
            Write-Host "rotate_web_secret=true — forcing credential rotation for app $env:WEB_CLIENT_ID"
          }
          else {
            Write-Host "First provision: generating client secret for app $env:WEB_CLIENT_ID"
          }

          $secretJson = az ad app credential reset `
            --id $env:WEB_CLIENT_ID `
            --append `
            --display-name "cicd-managed-$($env:ENV_NAME)" `
            --years 1 `
            --output json | ConvertFrom-Json

          $clientSecret = $secretJson.password
          Write-Host "::add-mask::$clientSecret"
          $clientSecret | Out-File -FilePath $secretPath -Encoding utf8 -NoNewline

          if ($rotate) {
            Write-Host "Pruning expired credentials from app registration $env:WEB_CLIENT_ID..."
            try {
              $creds = az ad app credential list --id $env:WEB_CLIENT_ID --output json | ConvertFrom-Json
              $now = [DateTimeOffset]::UtcNow
              $expired = @($creds | Where-Object {
                $_.keyId -and $_.keyId -ne $secretJson.keyId -and [DateTimeOffset]::Parse($_.endDateTime) -lt $now
              })
              foreach ($cred in $expired) {
                az ad app credential delete --id $env:WEB_CLIENT_ID --key-id $cred.keyId --output none
                Write-Host "Deleted expired credential keyId=$($cred.keyId)"
              }
              Write-Host 'Expired-credential pruning complete.'
            }
            catch {
              Write-Host 'Could not list or prune credentials — skipping pruning (non-fatal).'
            }
          }

      - name: Azure login to workforce tenant for Key Vault write
        if: steps.web_secret_check.outputs.should_update == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Store web-client-secret in Key Vault
        if: steps.web_secret_check.outputs.should_update == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $secretPath = Join-Path $PWD '.web-client-secret'
          try {
            $clientSecret = Get-Content -Path $secretPath -Raw
            Write-Host "::add-mask::$clientSecret"
            $maxAttempts = 6
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              az keyvault secret set `
                --vault-name '${{ steps.web_secret_check.outputs.kv_name }}' `
                --name web-client-secret `
                --value $clientSecret `
                --output none
              if ($LASTEXITCODE -eq 0) {
                break
              }

              if ($attempt -eq $maxAttempts) {
                throw "Failed to store web-client-secret in Key Vault after $maxAttempts attempts."
              }

              Write-Host "Key Vault secret set failed (attempt $attempt/$maxAttempts); waiting 15 seconds for RBAC propagation..."
              Start-Sleep -Seconds 15
            }
            Write-Host "web-client-secret stored in Key Vault ${{ steps.web_secret_check.outputs.kv_name }}"
          }
          finally {
            if (Test-Path $secretPath) {
              Remove-Item $secretPath -Force
            }
          }

      - name: Summarise deployment outputs
        if: success()
        shell: pwsh
        run: |
          $outputs = (Get-Content deploy-output.json -Raw | ConvertFrom-Json).properties.outputs
          '## Deployment Outputs' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```json' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $summary = [ordered]@{}
          foreach ($property in $outputs.PSObject.Properties) {
            $summary[$property.Name] = $property.Value.value
          }
          $summary | ConvertTo-Json -Depth 5 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
