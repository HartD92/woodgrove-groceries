# =============================================================================
# Woodgrove Groceries — Application Deploy
#
# Monorepo deployment for all four App Services. Each matrix leg publishes one
# .NET service, logs into Azure with the proven azure-infra OIDC repo variables,
# resolves the tokenized App Service name by role infix, then deploys that app.
# =============================================================================

name: Build and deploy Woodgrove Groceries apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy ${{ matrix.id }}
    runs-on: ubuntu-latest
    environment: azure-infra
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: web
            project: src/storefront/woodgrovedemo.csproj
            infix: -web-
          - id: api
            project: src/api/woodgrove-groceries-api.csproj
            infix: -api-
          - id: auth
            project: src/auth-api/woodgroveapi.csproj
            infix: -auth-
          - id: graph
            project: src/graph-middleware/woodgrove-groceries-graph-middleware.csproj
            infix: -graph-

    env:
      RESOURCE_GROUP: rg-woodgrove-dev
      PUBLISH_DIR: ${{ runner.temp }}/publish/${{ matrix.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish ${{ matrix.id }}
        run: dotnet publish "${{ matrix.project }}" --configuration Release --output "${PUBLISH_DIR}"

      - name: Azure login to workforce tenant (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve App Service name
        id: resolve-app
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t app_names < <(az webapp list \
            --resource-group "${RESOURCE_GROUP}" \
            --query "[?contains(name,'${{ matrix.infix }}')].name" \
            --output tsv)

          if [[ ${#app_names[@]} -eq 0 ]]; then
            echo "::error::No App Service found in ${RESOURCE_GROUP} with name infix '${{ matrix.infix }}'."
            exit 1
          fi

          if [[ ${#app_names[@]} -gt 1 ]]; then
            echo "::error::Expected one App Service in ${RESOURCE_GROUP} with name infix '${{ matrix.infix }}', found: ${app_names[*]}"
            exit 1
          fi

          echo "app-name=${app_names[0]}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ${{ matrix.id }} App Service: ${app_names[0]}"

      - name: Deploy ${{ matrix.id }} to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.resolve-app.outputs.app-name }}
          package: ${{ env.PUBLISH_DIR }}
